<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKComputer — Spike Backtester</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #040608; --bg1: #0a0e14; --bg2: #121820;
            --border: #1e2632; --up: #00e5a0; --dn: #ff4560;
            --bl: #3b9eff; --t1: #e8eff8; --t2: #8fa3bc;
            --r: 12px; --mono: 'IBM Plex Mono', monospace; --sans: 'Syne', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            height: 100dvh; background: var(--bg0); color: var(--t1); 
            font-family: var(--mono); font-size: 13px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Top Navigation & Price */
        .hdr { padding: 15px; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--sans); font-size: 14px; color: var(--bl); }
        .price-display { font-family: var(--sans); font-size: 36px; margin-top: 5px; letter-spacing: -1px; }

        /* Performance Metrics Bar */
        .metrics { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .metric-item { flex: 1; background: var(--bg1); padding: 10px; text-align: center; }
        .metric-label { font-size: 9px; color: var(--t2); text-transform: uppercase; margin-bottom: 4px; }
        .metric-val { font-weight: 600; font-size: 14px; }

        /* Tabs */
        .tabs { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 15px; border: none; background: none; color: var(--t2); font-family: var(--mono); font-size: 11px; font-weight: 600; }
        .tab.active { color: var(--t1); border-bottom: 2px solid var(--up); }

        /* Content Areas */
        .content { flex: 1; overflow-y: auto; }
        .panel { display: none; padding: 15px; }
        .panel.active { display: block; }

        /* History Log Styling */
        .log-entry { 
            background: var(--bg2); border: 1px solid var(--border); 
            border-radius: var(--r); padding: 12px; margin-bottom: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .status-tag { justify-self: end; font-size: 10px; padding: 2px 8px; border-radius: 4px; height: fit-content; }
        .status-win { background: rgba(0, 229, 160, 0.1); color: var(--up); }
        .status-miss { background: rgba(255, 69, 96, 0.1); color: var(--dn); }

        /* Prediction Card */
        .predict-card { 
            background: linear-gradient(145deg, var(--bg2), var(--bg1));
            border: 1px solid var(--bl); border-radius: var(--r); padding: 20px;
            text-align: center; margin-bottom: 20px;
        }

        .tick-track { height: 6px; background: #1a1f26; border-radius: 3px; margin: 15px 0; overflow: hidden; }
        .tick-fill { height: 100%; width: 0%; background: var(--bl); transition: 0.4s; }

        #alertNotify {
            position: fixed; top: 20px; left: 20px; right: 20px;
            background: var(--up); color: #000; padding: 15px; border-radius: var(--r);
            font-family: var(--sans); font-weight: 800; text-align: center;
            transform: translateY(-150%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="alertNotify">CRITICAL SPIKE ZONE REACHED</div>

<header class="hdr">
    <div class="flex-row">
        <div class="logo">BACKTEST_ENGINE_v9</div>
        <div id="status" style="font-size: 10px; color: var(--up);">● SYSTEM LIVE</div>
    </div>
    <div id="price" class="price-display">0.00</div>
</header>

<div class="metrics">
    <div class="metric-item">
        <div class="metric-label">Win Rate</div>
        <div id="winRate" class="metric-val" style="color: var(--up);">0%</div>
    </div>
    <div class="metric-item">
        <div class="metric-label">Signals</div>
        <div id="totalSigs" class="metric-val">0</div>
    </div>
    <div class="metric-item">
        <div class="metric-label">Avg Lead</div>
        <div class="metric-val">~45s</div>
    </div>
</div>

<nav class="tabs">
    <button class="tab active" onclick="switchTab(0)">ANALYSIS</button>
    <button class="tab" onclick="switchTab(1)">HISTORY LOG</button>
    <button class="tab" onclick="switchTab(2)">SETTINGS</button>
</nav>

<main class="content">
    <!-- Analysis Panel -->
    <div id="p0" class="panel active">
        <div class="predict-card">
            <div style="font-size: 10px; color: var(--t2); text-transform: uppercase;">Next Spike Probability</div>
            <div id="probVal" style="font-size: 48px; font-family: var(--sans); margin: 10px 0;">0%</div>
            <div class="tick-track"><div id="tickFill" class="tick-fill"></div></div>
            <div class="flex-row" style="font-size: 11px;">
                <span id="tickText">Ticks: 0/1000</span>
                <span id="zoneState" style="color: var(--t2);">IDLE</span>
            </div>
        </div>

        <div style="font-size: 11px; color: var(--t2); margin-bottom: 10px;">CONFLUENCE FILTERS</div>
        <div class="log-entry" style="grid-template-columns: 1fr; font-size: 12px;">
            <div class="flex-row"><span>M1 Trend Filter</span> <span style="color:var(--up)">PASSED</span></div>
            <div class="flex-row"><span>Volatility Squeeze</span> <span id="volFilter" style="color:var(--t2)">WAITING</span></div>
        </div>
    </div>

    <!-- History Panel -->
    <div id="p1" class="panel">
        <div id="historyContainer">
            <!-- Entries injected here -->
        </div>
    </div>
</main>

<script>
    let state = {
        price: 5000.00,
        ticks: 0,
        target: 800,
        wins: 0,
        total: 0,
        isAlerting: false,
        lastAlertTick: 0
    };

    function switchTab(index) {
        document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === index));
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    }

    function addLogEntry(type, tickAt) {
        const container = document.getElementById('historyContainer');
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });
        
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `
            <div>
                <div style="font-weight:600; font-size:13px;">BOOM 1000 Spike</div>
                <div style="font-size:10px; color:var(--t2);">${time} | Ticks: ${tickAt}</div>
            </div>
            <span class="status-tag ${type === 'WIN' ? 'status-win' : 'status-miss'}">${type}</span>
        `;
        container.prepend(div);
        
        state.total++;
        if(type === 'WIN') state.wins++;
        updateStats();
    }

    function updateStats() {
        document.getElementById('totalSigs').innerText = state.total;
        const rate = state.total === 0 ? 0 : Math.round((state.wins / state.total) * 100);
        document.getElementById('winRate').innerText = rate + '%';
    }

    function engine() {
        // Simulating Tick Movement
        let move = (Math.random() * 0.5) - 0.2;
        state.price += move;
        state.ticks++;

        // Update UI
        document.getElementById('price').innerText = state.price.toFixed(2);
        document.getElementById('tickText').innerText = `Ticks: ${state.ticks}/${state.target}`;
        
        let progress = (state.ticks / state.target) * 100;
        document.getElementById('tickFill').style.width = Math.min(progress, 100) + '%';
        document.getElementById('probVal').innerText = Math.round(progress) + '%';

        // Prediction Logic
        if (progress >= 85 && !state.isAlerting) {
            state.isAlerting = true;
            state.lastAlertTick = state.ticks;
            triggerVisualAlert(true);
            document.getElementById('zoneState').innerText = "KILL ZONE";
            document.getElementById('zoneState').style.color = "var(--dn)";
        }

        // Random Spike Logic (Backtest Simulation)
        if (Math.random() > 0.995 && state.ticks > 100) {
            let spikeSize = Math.random() * 20 + 10;
            state.price += spikeSize;
            
            // Log the result
            if (state.isAlerting) {
                addLogEntry('WIN', state.ticks);
            } else {
                addLogEntry('MISS', state.ticks);
            }

            // Reset
            state.ticks = 0;
            state.isAlerting = false;
            state.target = Math.floor(Math.random() * 400) + 600; // Variable targets to reduce noise
            triggerVisualAlert(false);
            document.getElementById('zoneState').innerText = "IDLE";
            document.getElementById('zoneState').style.color = "var(--t2)";
        }

        // Handle Failed Alerts (No spike within 120% of target)
        if (state.ticks > state.target * 1.2 && state.isAlerting) {
            addLogEntry('MISS', state.ticks);
            state.isAlerting = false;
            triggerVisualAlert(false);
        }
    }

    function triggerVisualAlert(show) {
        const el = document.getElementById('alertNotify');
        el.style.transform = show ? 'translateY(0)' : 'translateY(-150%)';
    }

    setInterval(engine, 800); // Running engine at high speed for backtest simulation
</script>

</body>
</html>
